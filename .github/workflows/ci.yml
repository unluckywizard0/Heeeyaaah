name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, types, build, unit tests
    runs-on: ubuntu-latest
    # Dummy public keys: `next build` reads them at build time; they never touch
    # a real project and the anon key is public by design.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Importer self-test
        run: npm run import:5etools -- --self-test

  rls:
    name: RLS isolation (DM/player)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nerdos_rls_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/nerdos_rls_test
    steps:
      - uses: actions/checkout@v4
      - name: Verify DM/player RLS isolation
        run: bash scripts/test-rls.sh
